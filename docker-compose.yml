networks:
  app_network:
    driver: bridge
  home_default:
    name: home_default
    external: true

services:
  app_atmosphere:
    build: .
    volumes:
      - .:/home/atmosphere
      - vendor:/home/atmosphere/vendor
    working_dir: /home/atmosphere
    command: >
      sh -c "
      composer install &&
      if [ ! -d 'app/Providers/Filament' ]; then
        composer require filament/filament:^5.0 -W --no-audit --ignore-platform-req=php+ &&
        php artisan filament:install --panels --quiet;
      fi &&
      php artisan key:generate &&
      php artisan migrate --force &&
      chown -R www-data:www-data /home/atmosphere/storage &&
      chown -R www-data:www-data /home/atmosphere/bootstrap/cache &&
      chmod -R 775 /home/atmosphere/storage &&
      chmod -R 775 /home/atmosphere/bootstrap/cache &&
      php-fpm
      "
    depends_on:
      mysql_atmosphere:
        condition: service_healthy
    networks:
      app_network:
      home_default:
        aliases:
          - app_atmosphere
    ports:
      - "9000:9000"

  mysql_atmosphere:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    volumes:
      - dbdata_atmosphere:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 10
    networks:
      - app_network
    ports:
      - "3306:3306"

volumes:
  dbdata_atmosphere:
  vendor: